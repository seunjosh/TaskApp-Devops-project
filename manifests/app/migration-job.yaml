apiVersion: batch/v1
kind: Job
metadata:
  name: backend-migration
  namespace: taskapp
spec:
  backoffLimit: 3
  template:
    metadata:
      labels:
        app: backend-migration
    spec:
      restartPolicy: OnFailure
      containers:
        - name: migration
          image: ghcr.io/ts-a-devops/taskapp-backend:5d6b8fc
          imagePullPolicy: IfNotPresent
          command:
            - sh
            - -c
            - python -c "from app import create_app; create_app()"
          env:
            - name: DATABASE_HOST
              valueFrom:
                configMapKeyRef:
                  name: taskapp-config
                  key: DATABASE_HOST
            - name: DATABASE_PORT
              valueFrom:
                configMapKeyRef:
                  name: taskapp-config
                  key: DATABASE_PORT
            - name: DATABASE_NAME
              valueFrom:
                configMapKeyRef:
                  name: taskapp-config
                  key: DATABASE_NAME
            - name: DATABASE_USER
              valueFrom:
                secretKeyRef:
                  name: taskapp-secret
                  key: DATABASE_USER
            - name: DATABASE_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: taskapp-secret
                  key: DATABASE_PASSWORD
            - name: SECRET_KEY
              valueFrom:
                secretKeyRef:
                  name: taskapp-secret
                  key: SECRET_KEY
          resources:
            requests:
              cpu: "50m"
              memory: "128Mi"
            limits:
              cpu: "300m"
              memory: "256Mi"
